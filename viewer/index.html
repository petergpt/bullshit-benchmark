<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BullshitBench Viewer Redirect</title>
  <link rel="canonical" href="./index.v2.html">
  <meta http-equiv="refresh" content="0; url=./index.v2.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f2eee6;
      color: #1d2521;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    a {
      color: #18493f;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <p>Redirecting to the current viewer at <a id="target" href="./index.v2.html">index.v2.html</a>.</p>
  <script>
    const current = new URL(window.location.href);
    const targetUrl = new URL("./index.v2.html", window.location.href);
    ["benchmark", "version"].forEach((key) => {
      const value = current.searchParams.get(key);
      if (value) targetUrl.searchParams.set(key, value);
    });
    targetUrl.hash = current.hash;
    document.getElementById("target").href = targetUrl.toString();
    window.location.replace(targetUrl.toString());
  </script>
</body>
</html>
